import logging
import os


def _getenv_bool(name, default=False):
    val = os.getenv(name)
    if val is None:
        return default
    return val.strip().lower() in ('true', '1', 'yes')


# Build database URI from individual DB_* variables,
# falling back to a local SQLite file if DB_API is not set.
_db_api = os.getenv("DB_API", "")
if _db_api:
    _db_uri = (
        f"{_db_api}://"
        f"{os.getenv('DB_USER', '')}:{os.getenv('DB_PASSWORD', '')}"
        f"@{os.getenv('DB_HOST', '')}:{os.getenv('DB_PORT', '')}"
        f"/{os.getenv('DB_NAME', '')}"
        f"{os.getenv('DB_EXTRA_PARAMS', '')}"
    )
else:
    _db_uri = "sqlite:////privacyidea/etc/persistent/data.sqlite"

# Variables that require type conversion or computed defaults.
# These are applied last and override any raw PI_* env vars of the same name.
_pi_special = {
    'SUPERUSER_REALM': os.getenv("SUPERUSER_REALM", "admin,helpdesk").split(','),
    'PI_ENCFILE': '/privacyidea/etc/persistent/enckey',
    'PI_SCRIPT_HANDLER_DIRECTORY': '/privacyidea/scripts',
    'PI_SCRIPT_SMSPROVIDER_DIRECTORY': os.getenv("PI_SCRIPT_SMSPROVIDER_DIRECTORY", "/privacyidea/scripts"),
    'PI_LOGCONFIG': '/privacyidea/etc/logging.cfg',
    'PI_UUID_FILE': '/privacyidea/etc/persistent/uuid.txt',
    'PI_LOGLEVEL': logging.getLevelName(os.getenv("PI_LOGLEVEL", "INFO").upper()),
    'PI_AUDIT_KEY_PRIVATE': os.getenv("PI_AUDIT_KEY_PRIVATE", '/privacyidea/etc/persistent/private.pem'),
    'PI_AUDIT_KEY_PUBLIC': os.getenv("PI_AUDIT_KEY_PUBLIC", '/privacyidea/etc/persistent/public.pem'),
    'PI_AUDIT_SQL_TRUNCATE': _getenv_bool("PI_AUDIT_SQL_TRUNCATE", True),
    'PI_AUDIT_NO_SIGN': _getenv_bool("PI_AUDIT_NO_SIGN", False),
    'PI_AUDIT_POOL_SIZE': os.getenv("PI_AUDIT_POOL_SIZE", "20"),
    'PI_ENGINE_REGISTRY_CLASS': os.getenv("PI_ENGINE_REGISTRY_CLASS", "shared"),
    'PI_SQLALCHEMY_ENGINE_OPTIONS': {"pool_pre_ping": _getenv_bool("PI_SQLALCHEMY_ENGINE_OPTIONS", False)},
    'SQLALCHEMY_DATABASE_URI': _db_uri,
}

# Apply all PI_* environment variables as-is (raw strings).
# Provides automatic pass-through for any PI_* var not listed above.
for k, v in os.environ.items():
    if k.startswith('PI_'):
        locals()[k] = v

# Apply special config last so type-converted values always win.
for k, v in _pi_special.items():
    locals()[k] = v

